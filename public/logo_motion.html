<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timothy — Logo Motion</title>
<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Fraunces', Georgia, serif;
  background: #1a1412;
  overflow: hidden;
}

/* ─── Stage ─── */
.stage {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at 50% 44%, #fff6ea 0%, #ffedd6 52%, #f6d9b6 100%),
    radial-gradient(circle at 18% 78%, rgba(255,209,102,0.18) 0%, transparent 52%),
    radial-gradient(circle at 82% 22%, rgba(232,168,56,0.12) 0%, transparent 48%);
}

/* ─── Ambient Orbs ─── */
.orb {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  contain: layout style paint;
  pointer-events: none;
}
.orb--sun {
  width: 220px; height: 220px;
  top: 28%; left: 52%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(255,217,138,0.55) 0%, rgba(245,166,35,0.15) 70%);
  filter: blur(42px);
  animation: orb-float-sun 5.5s ease-in-out infinite alternate;
}
.orb--peach {
  width: 160px; height: 160px;
  bottom: 22%; left: 18%;
  background: radial-gradient(circle, rgba(255,193,170,0.45) 0%, rgba(255,140,105,0.1) 72%);
  filter: blur(42px);
  animation: orb-float-peach 6.5s ease-in-out infinite alternate -2.5s;
}
.orb--sky {
  width: 130px; height: 130px;
  top: 18%; right: 16%;
  background: radial-gradient(circle, rgba(255,232,168,0.42) 0%, rgba(232,168,56,0.1) 70%);
  filter: blur(42px);
  animation: orb-float-sky 5s ease-in-out infinite alternate -4s;
}

@keyframes orb-float-sun {
  0%   { transform: translate(-50%, -50%) translate3d(0, 0, 0) scale(1); }
  100% { transform: translate(-50%, -50%) translate3d(-1.1rem, 1.5rem, 0) scale(1.05); }
}
@keyframes orb-float-peach {
  0%   { transform: translate3d(0, 0, 0) scale(1); }
  100% { transform: translate3d(1.4rem, -1.2rem, 0) scale(1.06); }
}
@keyframes orb-float-sky {
  0%   { transform: translate3d(0, 0, 0) scale(0.96); }
  100% { transform: translate3d(-1rem, 1.3rem, 0) scale(1.08); }
}

/* ─── Logo Container ─── */
.logo-wrap {
  position: relative;
  width: 70%;
  max-width: 320px;
  min-width: 200px;
  transform-origin: center center;
  backface-visibility: hidden;
}

.logo-wrap svg {
  display: block;
  width: 100%;
  height: auto;
  overflow: visible;
}

/* ─── Stroke Paths (draw-on state) ─── */
.stroke {
  stroke-dasharray: 1;
  stroke-dashoffset: 1;
  stroke-linecap: butt;
  opacity: 0;
}

/* ─── Sun Dot ─── */
.sun-dot { opacity: 0; }

/* ─── Glow Ring ─── */
.sun-glow { opacity: 0; }

/* ─── Wordmark ─── */
.wordmark { opacity: 0; }

/* ─── Replay Button ─── */
.replay {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(61, 46, 42, 0.08);
  border: 1px solid rgba(61, 46, 42, 0.15);
  color: #3d2e2a;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  padding: 0.55rem 1.4rem;
  border-radius: 100px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1),
              background 0.2s ease;
  pointer-events: none;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 10;
}
.replay:hover {
  background: rgba(61, 46, 42, 0.14);
}
.replay:focus-visible {
  outline: 2px solid #f5a623;
  outline-offset: 3px;
}

/* ─── Reduced Motion ─── */
@media (prefers-reduced-motion: reduce) {
  .orb { display: none; }
}

/* ─── Reduced Motion JS Class ─── */
.reduced-motion .orb { display: none; }
.reduced-motion .stage {
  background: #f6f2ed;
  transition: background 0.6s ease;
}
</style>
</head>
<body>
<div class="stage">
  <div class="orb orb--sun"></div>
  <div class="orb orb--peach"></div>
  <div class="orb orb--sky"></div>

  <div class="logo-wrap" id="logoWrap">
    <svg viewBox="0 0 168 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Timothy">
      <defs>
        <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffd166" stop-opacity="0.65"/>
          <stop offset="55%" stop-color="#f5a623" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- Glow ring (intro only) -->
      <circle class="sun-glow" id="sunGlow" cx="26" cy="16" r="22" fill="url(#sunGlow)"/>
      <!-- Pulse ring (intro only) -->
      <circle id="sunPulse" cx="26" cy="16" r="10" fill="#f5a623" opacity="0"/>

      <!-- T-bar -->
      <path class="stroke" id="tBar" d="M6 8h16" stroke="#3d2e2a" stroke-width="2.35"/>
      <!-- T-stem -->
      <path class="stroke" id="tStem" d="M14 8v22" stroke="#3d2e2a" stroke-width="2.35"/>
      <!-- T-curve -->
      <path class="stroke" id="tCurve" d="M14 26c6 0 11-3 12-8" stroke="#3d2e2a" stroke-width="2.35" stroke-linejoin="round"/>
      <!-- Sun dot -->
      <circle class="sun-dot" id="sunDot" cx="26" cy="16" r="3.2" fill="#f5a623"/>
      <!-- Wordmark -->
      <text class="wordmark" id="wordmark" x="30" y="27" fill="#3d2e2a" font-family="'Fraunces', Georgia, serif" font-size="20" font-weight="700" letter-spacing="-0.03em">imothy</text>
    </svg>
  </div>
</div>

<button class="replay" id="replay" aria-label="Replay animation">Replay</button>

<script>
(function () {
  'use strict';

  /* ── Detect reduced motion ── */
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (prefersReduced) {
    document.body.classList.add('reduced-motion');
    // Quick fade-in of complete logo
    requestAnimationFrame(function () {
      var logo = document.getElementById('logoWrap');
      logo.style.transition = 'opacity 0.3s ease';
      logo.style.opacity = '1';
      document.getElementById('replay').style.opacity = '1';
      document.getElementById('replay').style.pointerEvents = 'auto';
    });
    return;
  }

  /* ── Easing functions (cubic-bezier approximations of GSAP easings) ── */
  function easeStroke(t) { /* power1.inOut ≈ cubic-bezier(0.4, 0, 0.2, 1) */
    return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  }
  function easeGravity(t) { /* power3.in ≈ cubic-bezier(0.4, 0, 1, 1) */
    return t * t * t;
  }
  function easeBounce(t) { /* back.out(1.6) ≈ cubic-bezier(0.34, 1.56, 0.64, 1) */
    var c1 = 1.6;
    return 1 + (c1 + 1) * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }
  function easeBloom(t) { /* expo.out ≈ cubic-bezier(0.16, 1, 0.3, 1) */
    return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
  }
  function easeRise(t) { /* power2.out ≈ cubic-bezier(0.25, 1, 0.5, 1) */
    return 1 - Math.pow(1 - t, 2);
  }
  function easeFly(t) { /* power3.inOut ≈ cubic-bezier(0.32, 0, 0.67, 0) */
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  /* ── Animation engine (requestAnimationFrame timeline) ── */
  var tBar = document.getElementById('tBar');
  var tStem = document.getElementById('tStem');
  var tCurve = document.getElementById('tCurve');
  var sunDot = document.getElementById('sunDot');
  var sunGlow = document.getElementById('sunGlow');
  var sunPulse = document.getElementById('sunPulse');
  var wordmark = document.getElementById('wordmark');
  var logoWrap = document.getElementById('logoWrap');
  var replayBtn = document.getElementById('replay');

  var strokes = [tBar, tStem, tCurve];

  /* Compute path lengths for stroke drawing */
  var pathLengths = strokes.map(function (p) {
    return p.getTotalLength();
  });

  /* Initialize stroke dash */
  strokes.forEach(function (p, i) {
    p.style.strokeDasharray = pathLengths[i];
    p.style.strokeDashoffset = pathLengths[i];
  });

  /* Keyframe definitions — each describes one element's motion */
  var keys = {
    /* Strokes: draw-on with stagger */
    stroke: {
      elements: strokes,
      durations: [0.0, 0.06, 0.12], // stagger offsets
      duration: 0.28,
      fn: function (t, el, i) {
        var p = pathLengths[i];
        el.style.opacity = '1';
        el.style.strokeDashoffset = String(p * (1 - easeStroke(t)));
        if (t >= 1) {
          el.style.strokeDasharray = 'none';
          el.style.strokeDashoffset = '0';
          el.style.strokeLinecap = 'round';
          el.style.opacity = '1';
        }
      }
    },

    /* Sun dot: drop + bounce */
    dot: {
      element: sunDot,
      start: 0.36,
      duration: 0.32,
      fn: function (t) {
        var dropT = Math.min(t / 0.6, 1);
        var bounceT = Math.max(0, (t - 0.6) / 0.4);
        var dropY = -18 * (1 - easeGravity(dropT));
        var scale = t < 0.6 ? 1 : 1 + 0.15 * (1 - easeBounce(Math.min(bounceT / 0.5, 1)));
        sunDot.style.opacity = String(Math.min(t * 3, 1));
        sunDot.style.transform = 'translateY(' + dropY + 'px) scale(' + scale + ')';
      }
    },

    /* Glow ring: bloom from dot */
    glow: {
      element: sunGlow,
      start: 0.54,
      duration: 0.2,
      fn: function (t) {
        sunGlow.style.opacity = String(easeBloom(Math.min(t, 1)));
        sunGlow.style.transform = 'scale(' + (0.75 + 0.37 * easeBloom(Math.min(t, 1))) + ')';
      }
    },

    /* Pulse ring: quick burst then fade */
    pulse: {
      element: sunPulse,
      start: 0.6,
      duration: 0.2,
      fn: function (t) {
        var tt = Math.min(t, 1);
        var peak = tt < 0.5 ? tt * 2 : 1 - (tt - 0.5) * 2;
        sunPulse.style.opacity = String(peak * 0.35);
        sunPulse.style.transform = 'scale(' + (0.5 + 1.7 * easeStroke(peak)) + ')';
      }
    },

    /* Wordmark: fade up */
    word: {
      element: wordmark,
      start: 0.6,
      duration: 0.24,
      fn: function (t) {
        var tt = Math.min(t, 1);
        wordmark.style.opacity = String(easeRise(tt));
        wordmark.style.transform = 'translateY(' + (6 * (1 - easeRise(tt))) + 'px)';
      }
    },

    /* Ambient orbs: wake up */
    orbs: {
      elements: document.querySelectorAll('.orb'),
      start: 0.88,
      duration: 0.2,
      fn: function (t, el) {
        el.style.opacity = String(Math.min(1, t * 1.5) * 0.6);
      }
    }
  };

  /* ── Run timeline ── */
  var START = performance.now();
  var TIMELINE_MS = 1800;
  var running = true;

  function frame(now) {
    if (!running) return;
    var elapsed = (now - START) / 1000;

    /* Update each key */
    for (var name in keys) {
      var k = keys[name];
      var progress = (elapsed - (k.start || 0)) / k.duration;
      if (progress < 0) continue;
      if (k.elements) {
        for (var i = 0; i < k.elements.length; i++) {
          var stagger = k.durations ? k.durations[i] || 0 : 0;
          var p = Math.min(1, Math.max(0, (progress * k.duration - stagger) / k.duration));
          k.fn(Math.min(p, 1), k.elements[i], i);
        }
      } else {
        k.fn(Math.min(progress, 1));
      }
    }

    /* Fly-to-navbar handoff simulation (scale + move slightly) */
    if (elapsed >= 1.4) {
      var flyProgress = easeFly(Math.min((elapsed - 1.4) / 0.48, 1));
      var scale = 1 - 0.3 * flyProgress;
      var moveY = -150 * flyProgress;
      logoWrap.style.transform = 'scale(' + scale + ') translateY(' + moveY + 'px)';
      logoWrap.style.opacity = String(1 - flyProgress * 0.8);
    }

    /* Show replay */
    if (elapsed >= 1.58) {
      replayBtn.style.opacity = '1';
      replayBtn.style.pointerEvents = 'auto';
    }

    if (elapsed < TIMELINE_MS / 1000 + 0.5) {
      requestAnimationFrame(frame);
    }
  }

  /* Start */
  requestAnimationFrame(frame);

  /* ── Replay ── */
  replayBtn.addEventListener('click', function () {
    running = false;

    /* Reset all elements */
    strokes.forEach(function (el, i) {
      el.style.opacity = '0';
      el.style.strokeDasharray = pathLengths[i];
      el.style.strokeDashoffset = String(pathLengths[i]);
      el.style.strokeLinecap = 'butt';
    });
    sunDot.style.opacity = '0';
    sunDot.style.transform = '';
    sunGlow.style.opacity = '0';
    sunGlow.style.transform = '';
    sunPulse.style.opacity = '0';
    sunPulse.style.transform = '';
    wordmark.style.opacity = '0';
    wordmark.style.transform = '';
    logoWrap.style.transform = '';
    logoWrap.style.opacity = '1';
    replayBtn.style.opacity = '0';
    replayBtn.style.pointerEvents = 'none';

    document.querySelectorAll('.orb').forEach(function (o) {
      o.style.opacity = '0';
    });

    /* Restart */
    running = true;
    START = performance.now();
    requestAnimationFrame(frame);
  });
})();
</script>
</body>
</html>
