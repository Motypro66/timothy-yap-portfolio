<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logo 04 — Monoline T + sun dot + "imothy" wordmark
  Static vector. Use as favicon, OG image placeholder, or brand reference.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 40" fill="none" width="168" height="40">
  <!-- T-bar -->
  <path id="t-bar" d="M6 8h16" stroke="#3d2e2a" stroke-width="2.35" stroke-linecap="round"/>
  <!-- T-stem -->
  <path id="t-stem" d="M14 8v22" stroke="#3d2e2a" stroke-width="2.35" stroke-linecap="round"/>
  <!-- T-curve -->
  <path id="t-curve" d="M14 26c6 0 11-3 12-8" stroke="#3d2e2a" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sun dot -->
  <circle id="sun-dot" cx="26" cy="16" r="3.2" fill="#f5a623"/>
  <!-- Wordmark -->
  <text id="wordmark" x="30" y="27" fill="#3d2e2a" font-family="'Fraunces', Georgia, serif" font-size="20" font-weight="700" letter-spacing="-0.03em">imothy</text>
</svg>
